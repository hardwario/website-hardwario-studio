{% macro render(title, description, list, slides) %}
<div class="split" data-service-card>
    <div class="split__image-box">
        <div class="split__slider">
            <div class="split__slides" data-service-slides>
                {% for slide in slides %}
                <div class="split__slide{% if loop.first %} is-active{% endif %}" data-service-slide data-meta="{{ slide.meta }}">
                    <img src="/images/{{ slide.image }}.jpg" alt="{{ slide.imageAlt }} {{ loop.index }}" class="split__image">
                </div>
                {% endfor %}
            </div>
        </div>
    </div>
    <div class="split__content">
        <h3 class="split__title">{{ title }}</h3>
        <p class="split__meta" data-service-meta>{% if slides | length > 0 %}{{ slides[0].meta }}{% endif %}</p>
        <p class="split__desc">{{ description }}</p>

        <ul class="split__list">
            {% for item in list %}
                <li>{{ item }}</li>
            {% endfor %}
        </ul>

        <div class="split__controls">
            <button class="split__control" type="button" data-service-prev aria-label="Předchozí obrázek">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
            <button class="split__control" type="button" data-service-next aria-label="Další obrázek">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </div>
    </div>
</div>
{% endmacro %}
