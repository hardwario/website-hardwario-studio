<section class="contact" id="form">
    <div class="contact__container">
        <div class="contact__grid">

            <div class="contact__left">
                <h2 class="contact__title">Začněte svůj projekt</h2>
                <p class="contact__desc">Znáte výzvy svých zákazníků. My poskytujeme technologie a výrobu, která vám pomůže je vyřešit. Pojďme si promluvit o vašem dalším projektu.</p>
                <p class="contact__phone-label">Nebo zavolejte přímo</p>
                <a href="tel:+420775159734" class="contact__phone">+420 775 159 734</a>
                <a href="mailto:studio@hardwario.com" class="button button--primary">KONTAKTOVAT</a>
            </div>

            <div class="contact__right">
                <form class="contact__form" action="#" method="POST">
                    <div class="contact__row">
                        <div class="contact__field">
                            <label class="contact__label" for="contact-first-name">Jméno <span aria-hidden="true">*</span></label>
                            <input class="contact__input" type="text" id="contact-first-name" name="first_name" placeholder="Zadejte své jméno" required>
                        </div>
                        <div class="contact__field">
                            <label class="contact__label" for="contact-last-name">Příjmení <span aria-hidden="true">*</span></label>
                            <input class="contact__input" type="text" id="contact-last-name" name="last_name" placeholder="Zadejte své příjmení" required>
                        </div>
                    </div>
                    <div class="contact__row">
                        <div class="contact__field">
                            <label class="contact__label" for="contact-email">Email <span aria-hidden="true">*</span></label>
                            <input class="contact__input" type="email" id="contact-email" name="email" placeholder="Zadejte svůj e-mail" required>
                        </div>
                        <div class="contact__field">
                            <label class="contact__label" for="contact-service">Služba <span aria-hidden="true">*</span></label>
                            <div class="contact__select-wrap">
                                <select class="contact__input contact__select" id="contact-service" name="service" required>
                                    <option value="" disabled selected></option>
                                    <option value="velkoformatovy-3d-tisk">Velkoformátový 3D tisk</option>
                                    <option value="uv-potisk">Profesionální UV potisk</option>
                                    <option value="zakazkovy-3d-tisk">Zakázkový 3D tisk</option>
                                    <option value="test-odolnosti">Test odolnosti a funkčnosti</option>
                                    <option value="cad-modeling">CAD modeling</option>
                                </select>
                                <svg class="contact__select-arrow" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="contact__field">
                        <label class="contact__label" for="contact-message">Zpráva <span aria-hidden="true">*</span></label>
                        <textarea class="contact__input contact__textarea" id="contact-message" name="message" required></textarea>
                    </div>
                    <button class="button button--primary" type="submit">ODESLAT</button>
                </form>
            </div>

        </div>
    </div>
</section>
