{% macro render(label="", variant="primary", href="", aria_label="", attrs="", icon="") %}
{% set classes = "button button--" ~ variant %}
<a class="{{ classes }}" href="{{ href }}"{% if aria_label != "" %} aria-label="{{ aria_label }}"{% endif %}{% if attrs != "" %} {{ attrs | safe }}{% endif %}>
	<span class="button__label">{{ label }}</span>
	{% if icon == "arrow-right" %}
	<span class="button__icon" aria-hidden="true">
		<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
			<path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
		</svg>
	</span>
	{% elif icon == "arrow-left" %}
	<span class="button__icon" aria-hidden="true">
		<svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
			<path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" />
		</svg>
	</span>
	{% endif %}
</a>
{% endmacro %}
