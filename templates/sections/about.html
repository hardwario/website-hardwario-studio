{% import "macros.html" as macros %}

<section class="section section--tight about-us" id="about-us">
  <div class="container">
    <div class="about-us__inner" data-aos="fade-up">
      <div class="about-us__content">
        <span class="kicker">{{ d.about_us.subtitle }}</span>
        <h2 class="about-us__title">{{ d.about_us.title }}</h2>
        <p class="about-us__desc">{{ d.about_us.desc }}</p>
        <p class="about-us__desc">{{ d.about_us.desc2 }}</p>
      </div>
      <div class="about-us__image">
        {% set about_meta = get_image_metadata(path='static/images/HARDWARIO.svg', allow_missing=true) %}
        <img src="{{ get_url(path='images/HARDWARIO.svg') }}" alt="HARDWARIO"{% if about_meta %} width="{{ about_meta.width }}" height="{{ about_meta.height }}"{% endif %} loading="lazy" decoding="async">
      </div>
    </div>
  </div>
</section>
