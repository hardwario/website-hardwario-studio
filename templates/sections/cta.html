{% import "macros.html" as macros %}

<section class="cta">
  <div class="container">
    <div class="cta__inner" data-aos="fade-up">
      <h2 class="h2--big cta__title">{{ d.cta_title }}</h2>
      <p class="lead cta__text">{{ d.cta_text }}</p>
      <div class="cta__actions">
        <a href="{{ config.extra.meeting_href }}" target="_blank" rel="noopener noreferrer" class="btn btn--primary">{{ d.cta_primary }} {{ macros::cta_arrow() }}</a>
        <a href="#form" class="btn btn--outline">{{ d.cta_secondary }}</a>
      </div>
      <p class="cta__phone-note">{{ d.cta_phone_note }} <a href="{{ config.extra.phone_href }}">{{ config.extra.phone }}</a></p>
    </div>
  </div>
</section>
