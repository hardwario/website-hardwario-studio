{% import "macros.html" as macros %}

<section class="contact" id="form">
  <div class="container contact__inner">
    <div class="contact__copy" data-aos="fade-right">
      <div class="contant__head">
      <span class="kicker">{{ d.contact_kicker }}</span>
      <h2 class="h2--big h2--ink">{{ d.contact_title }}</h2>
      </div>
      <p class="lead">{{ d.contact_text }}</p>
      <div class="contact__phone">
        <p>{{ d.contact_phone_note }}</p>
        <a href="{{ config.extra.phone_href }}">{{ config.extra.phone }}</a>
      </div>
    </div>
    <form class="contact-form" method="post" action="#" onsubmit="return false;" data-aos="fade-left">
      <div class="contact-form__grid">
        <label>{{ trans(key='form_first_name', lang=lang) }} *
          <input type="text" name="first_name" placeholder="{{ trans(key='form_first_name_ph', lang=lang) }}" required>
        </label>
        <label>{{ trans(key='form_last_name', lang=lang) }} *
          <input type="text" name="last_name" placeholder="{{ trans(key='form_last_name_ph', lang=lang) }}" required>
        </label>
        <label>{{ trans(key='form_email', lang=lang) }} *
          <input type="email" name="email" placeholder="{{ trans(key='form_email_ph', lang=lang) }}" required>
        </label>
        <label>{{ trans(key='form_service', lang=lang) }} *
          <select name="service" required>
            <option value="" disabled selected>{{ trans(key='form_select', lang=lang) }}</option>
            <option>{{ trans(key='svc_large_3d', lang=lang) }}</option>
            <option>{{ trans(key='svc_uv', lang=lang) }}</option>
            <option>{{ trans(key='svc_custom_3d', lang=lang) }}</option>
            <option>{{ trans(key='svc_durability', lang=lang) }}</option>
            <option>{{ trans(key='svc_cad', lang=lang) }}</option>
          </select>
        </label>
        <label class="contact-form__full">{{ trans(key='form_message', lang=lang) }} *
          <textarea name="message" rows="4"></textarea>
        </label>
      </div>
      <button type="submit" class="btn btn--primary contact-form__submit">{{ trans(key='form_submit', lang=lang) }}</button>
    </form>
  </div>
</section>
