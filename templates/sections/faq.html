{% import "macros.html" as macros %}

<section class="section faq" id="faq">
  <div class="container faq__inner">
    <div class="faq__head" data-aos="fade-up">
      <span class="kicker">{{ d.faq_kicker }}</span>
      <h2 class="h2--big">{{ d.faq_title }}</h2>
      {% if d.faq_text %}<p class="lead">{{ d.faq_text }}</p>{% endif %}
    </div>
    <div class="faq__list" data-aos="fade-up">
      {% for item in d.faq %}
      <details class="faq-item"{% if loop.first %} open{% endif %}>
        <summary>
          <span class="faq-item__q">{{ item.q }}</span>
          <svg class="faq-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
        </summary>
        <div class="faq-item__answer"><p>{{ item.a }}</p></div>
      </details>
      {% endfor %}
    </div>
    {% if d.faq_cta %}<a href="#form" class="btn btn--primary faq__cta" data-aos="fade-up">{{ d.faq_cta }}</a>{% endif %}
  </div>
</section>
