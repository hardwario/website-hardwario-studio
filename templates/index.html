{% extends "base.html" %}
{% import "components/step.html" as component_step %}

{% block content %}
<section class="steps">
    <h2 class="title">Nabízíme</h2>
    <div class="steps-grid">
        {% for step in section.extra.step %}
            {{ component_step::render(
                number=step.cislo,
                title=step.nazev,
                desc=step.popis
            ) }}
        {% endfor %}
    </div>
</section>
{% endblock content %}
