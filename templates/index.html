{% extends "base.html" %}
{% import "components/step.html" as component_step %}

{% block content %}
<section class="steps">
    <h2 class="title">Nabízíme</h2>
    <div class="steps-grid">
        {% for krok in section.extra.kroky %}
            {{ component_step::render(
                cislo=krok.cislo,
                nazev=krok.nazev,
                popis=krok.popis
            ) }}
        {% endfor %}
    </div>
</section>
{% endblock content %}
